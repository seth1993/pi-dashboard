<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --owl-yellow: #f0b429;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
    }
    
    /* Background */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    .background-gradient {
      position: absolute;
      left: 0;
      top: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(180deg, #0d1117 0%, #161b22 50%, #1a1a2e 100%);
      z-index: 1;
    }
    
    .background-image {
      position: absolute;
      right: 0;
      top: 0;
      width: 65%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    
    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 40px;
      background: linear-gradient(90deg, rgba(10,10,15,0.92) 0%, rgba(10,10,15,0.6) 50%, transparent 100%);
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .big-time { 
      font-size: 14rem; 
      font-weight: 100;
      line-height: 0.9;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stats-row {
      display: flex;
      gap: 80px;
      align-items: flex-start;
      margin-top: 40px;
    }
    
    .stat { text-align: left; }
    
    .stat-value {
      font-size: 4.5rem;
      font-weight: bold;
      line-height: 1;
    }
    
    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
    }
    
    .stat.days .stat-value { color: #f39c12; }
    .stat.balance .stat-value { color: var(--owl-yellow); }
    
    .weather-text {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
    }
    
    .weather-temp {
      font-size: 4.5rem;
      font-weight: bold;
    }
    
    .qa-section {
      margin-top: 50px;
      max-width: 900px;
    }
    
    .qa-question {
      font-size: 3.5rem;
      font-weight: 300;
      line-height: 1.2;
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
    }
    
    .qa-buttons {
      display: flex;
      gap: 30px;
    }
    
    .qa-btn {
      padding: 25px 60px;
      font-size: 2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 200px;
    }
    
    .qa-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }
    
    .qa-btn.yes { border-color: rgba(46, 204, 113, 0.5); }
    .qa-btn.yes:hover { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; }
    .qa-btn.no { border-color: rgba(231, 76, 60, 0.5); }
    .qa-btn.no:hover { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }
    
    .owl {
      position: absolute;
      bottom: 40px;
      right: 40px;
      font-size: 2rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    
    @media (max-width: 900px) {
      .background-gradient { width: 50%; }
      .background-image { width: 50%; }
      .overlay { background: rgba(10,10,15,0.85); padding: 20px; }
      .big-time { font-size: 7rem; }
      .stats-row { flex-direction: column; gap: 30px; margin-top: 30px; }
      .stat-value { font-size: 3rem; }
      .weather-temp { font-size: 3rem; }
      .qa-section { margin-top: 30px; }
      .qa-question { font-size: 2rem; }
      .qa-buttons { flex-direction: column; gap: 15px; }
      .qa-btn { padding: 20px 40px; font-size: 1.5rem; min-width: auto; }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="background-gradient"></div>
    <div class="background-image" id="bg-image"></div>
  </div>
  
  <div class="overlay">
    <div class="container">
      <div class="big-time" id="time"></div>
      
      <div class="stats-row">
        <div class="stat days">
          <div class="stat-value" id="days-until">--</div>
          <div class="stat-label">Days to R3</div>
        </div>
        
        <div class="stat balance">
          <div class="stat-value" id="balance">$0</div>
          <div class="stat-label">LLM Balance</div>
        </div>
        
        <div class="stat weather">
          <div class="stat-value">
            <span class="weather-text" id="weather-icon">--</span>
            <span class="weather-temp" id="weather-temp">--</span>
          </div>
          <div class="stat-label">Weather</div>
        </div>
      </div>
      
      <div class="qa-section">
        <div class="qa-question" id="qa-question">Loading...</div>
        <div class="qa-buttons">
          <button class="qa-btn yes" onclick="answerQuestion('yes')">Yes</button>
          <button class="qa-btn no" onclick="answerQuestion('no')">No</button>
        </div>
      </div>
    </div>
    
    <div class="owl">OWL</div>
  </div>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDEJHudLpT2A",
      authDomain: "sethexample11.firebaseapp.com",
      projectId: "sethexample11",
      storageBucket: "sethexample11.appspot.com",
      messagingSenderId: "78193417902",
      appId: "1:78193417902:web:19b00ebc1915949a96573f"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    window.answerQuestion = async function(answer) {
      const question = window.currentQuestion;
      const timestamp = new Date();
      
      try {
        await addDoc(collection(db, 'responses'), {
          question: question,
          answer: answer,
          timestamp: timestamp.toISOString(),
          dayOfWeek: timestamp.getDay(),
          hour: timestamp.getHours()
        });
        console.log('Answer saved:', { question, answer, timestamp });
      } catch(e) {
        console.error('Error saving answer:', e);
      }
      
      // Load next question
      loadQuestion();
    };
  </script>
  
  <script>
    const dayCategoryMap = {
      0: 'nature', 1: 'mountains', 2: 'ocean', 3: 'city',
      4: 'forest', 5: 'beach', 6: 'travel'
    };
    
    const weatherMap = {
      'Sunny': { text: 'SUNNY', category: 'sunset' },
      'Partly cloudy': { text: 'PARTLY CLOUDY', category: 'clouds' },
      'Cloudy': { text: 'CLOUDY', category: 'clouds' },
      'Overcast': { text: 'OVERCAST', category: 'clouds' },
      'Mist': { text: 'MIST', category: 'clouds' },
      'Patchy rain possible': { text: 'RAIN', category: 'rain' },
      'Patchy light rain': { text: 'RAIN', category: 'rain' },
      'Light rain': { text: 'RAIN', category: 'rain' },
      'Moderate rain': { text: 'RAIN', category: 'rain' },
      'Heavy rain': { text: 'HEAVY RAIN', category: 'rain' },
      'Thunderstorm': { text: 'STORM', category: 'rain' },
      'Snow': { text: 'SNOW', category: 'snow' },
      'Blizzard': { text: 'BLIZZARD', category: 'snow' },
      'Fog': { text: 'FOG', category: 'clouds' }
    };
    
    // Day-relevant + project questions
    const dayQuestions = {
      0: [ // Sunday - rest/recovery + planning
        "Ready to plan the week ahead?",
        "Feeling recharged from the weekend?",
        "Time to review this week's goals?",
        "Ready to prep for a productive week?",
        "Want to tackle a big project today?"
      ],
      1: [ // Monday - fresh start
        "Ready to start the week strong?",
        "Feeling motivated for Monday?",
        "Time to crush this week's goals?",
        "Ready to make Monday count?",
        "Want to get the week rolling with a run?"
      ],
      2: [ // Tuesday - midweek momentum
        "Midweek momentum building?",
        "Ready to keep the week going?",
        "Time for a solid training run?",
        "Feeling the midweek energy?",
        "Want to check off some tasks today?"
      ],
      3: [ // Thursday - approaching weekend
        "Almost to the weekend - ready to push?",
        "Time to finish the week strong?",
        "Feeling ready for a longer run?",
        "Want to wrap up pending projects?",
        "Ready to make Thursday count?"
      ],
      4: [ // Friday - week wrap-up
        "Ready to finish the week strong?",
        "Time to wrap up this week's tasks?",
        "Feeling the Friday energy?",
        "Want to start the weekend with a win?",
        "Ready to celebrate the week's wins?"
      ],
      5: [ // Saturday - weekend + long run
        "Is today a long run day?",
        "Ready for a weekend adventure?",
        "Feeling strong for Saturday?",
        "Time to log some serious miles?",
        "Ready to enjoy the weekend?"
      ],
      6: [ // Sunday - rest + reflection
        "Ready for an easy recovery run?",
        "Time to reflect on the week?",
        "Feeling rested and ready?",
        "Want to set up next week for success?",
        "Ready to enjoy a relaxed Sunday?"
      ]
    };
    
    const projectQuestions = [
      "Time to work on BidFolder?",
      "Ready to push ProposalPulse forward?",
      "Want to make progress on the Pi dashboard?",
      "Time to tackle that LinkedIn post?",
      "Ready to do some cold outreach?",
      "Want to record that demo video?",
      "Time to build something cool?",
      "Ready to check off a task?"
    ];
    
    let currentQuestion = "";
    
    function setBackgroundImage(category) {
      document.getElementById('bg-image').style.backgroundImage = 
        `url('https://static.photos/1920x1080/${category}')`;
    }
    
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = 
        `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
    }
    
    function updateDaysUntil() {
      const r3Date = new Date('2026-05-09');
      const today = new Date();
      document.getElementById('days-until').textContent = 
        Math.ceil((r3Date - today) / (1000 * 60 * 60 * 24));
    }
    
    async function loadBalance() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/seth1993/pi-dashboard/main/balance.json', { cache: 'no-cache' });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('balance').textContent = '$' + Math.floor(data.minimax);
        }
      } catch(e) { console.log('Balance:', e.message); }
    }
    
    function loadWeather() {
      fetch('https://wttr.in/?format=j1')
        .then(r => r.json())
        .then(d => {
          const w = d.current_condition[0];
          const tempF = Math.round(w.temp_F);
          const weatherDesc = w.weatherDesc[0].value;
          let weatherInfo = weatherMap[weatherDesc] || { text: 'CLEAR', category: 'nature' };
          document.getElementById('weather-icon').textContent = weatherInfo.text;
          document.getElementById('weather-temp').textContent = tempF + '°';
          setBackgroundImage(weatherInfo.category);
        })
        .catch(() => {
          const dayOfWeek = new Date().getDay();
          setBackgroundImage(dayCategoryMap[dayOfWeek] || 'nature');
          document.getElementById('weather-icon').textContent = 'CLEAR';
          document.getElementById('weather-temp').textContent = '--';
        });
    }
    
    function loadQuestion() {
      const dayOfWeek = new Date().getDay();
      const dayQ = dayQuestions[dayOfWeek] || dayQuestions[0];
      
      // Mix of day-specific and project questions (70% day, 30% project)
      let pool;
      if (Math.random() < 0.7) {
        pool = dayQ;
      } else {
        pool = projectQuestions;
      }
      
      let newQuestion;
      do {
        newQuestion = pool[Math.floor(Math.random() * pool.length)];
      } while (newQuestion === currentQuestion && pool.length > 1);
      
      currentQuestion = newQuestion;
      document.getElementById('qa-question').textContent = currentQuestion;
    }
    
    updateTime();
    updateDaysUntil();
    loadBalance();
    loadWeather();
    loadQuestion();
    
    setTimeout(() => location.reload(), 30000);
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
