<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Emoji font fallback */
    body, .emoji, .weather-icon {
      font-family: 'Noto Color Emoji', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    :root {
      --owl-yellow: #f0b429;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
    }
    
    /* Background: 30% gradient, 70% image */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    .background-gradient {
      position: absolute;
      left: 0;
      top: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(180deg, #0d1117 0%, #161b22 50%, #1a1a2e 100%);
      z-index: 1;
    }
    
    .background-image {
      position: absolute;
      right: 0;
      top: 0;
      width: 65%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    
    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 40px;
      background: linear-gradient(90deg, rgba(10,10,15,0.92) 0%, rgba(10,10,15,0.6) 50%, transparent 100%);
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* Big time - huge, no AM/PM */
    .time-section {
      margin-bottom: 40px;
    }
    
    .big-time { 
      font-size: 14rem; 
      font-weight: 100;
      line-height: 0.9;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Stats in a row */
    .stats-row {
      display: flex;
      gap: 80px;
      align-items: flex-start;
    }
    
    .stat {
      text-align: left;
    }
    
    .stat-value {
      font-size: 4.5rem;
      font-weight: bold;
      line-height: 1;
    }
    
    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
    }
    
    .stat.days .stat-value {
      color: #f39c12;
    }
    
    .stat.balance .stat-value {
      color: var(--owl-yellow);
    }
    
    /* Weather stat */
    .stat.weather .stat-value {
      display: flex;
      align-items: baseline;
      gap: 15px;
    }
    
    .weather-text {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
    }
    
    .weather-temp {
      font-size: 4.5rem;
      font-weight: bold;
    }
    
    /* On My Mind */
    .on-my-mind {
      margin-top: 50px;
      padding: 25px 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      max-width: 700px;
    }
    
    .on-my-mind-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
    }
    
    .on-my-mind-text {
      font-size: 1.6rem;
      color: rgba(255,255,255,0.85);
      font-style: italic;
      line-height: 1.4;
    }
    
    /* Owl - text only */
    .owl {
      position: absolute;
      bottom: 40px;
      right: 40px;
      font-size: 2rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    
    /* Mobile */
    @media (max-width: 900px) {
      .background-gradient { width: 50%; }
      .background-image { width: 50%; }
      .overlay { background: rgba(10,10,15,0.85); padding: 20px; }
      .big-time { font-size: 7rem; }
      .stats-row { flex-direction: column; gap: 30px; margin-top: 30px; }
      .stat-value { font-size: 3rem; }
      .weather-temp { font-size: 3rem; }
      .weather-icon { font-size: 3rem; }
      .on-my-mind { margin-top: 30px; padding: 20px; }
      .on-my-mind-text { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="background">
    <div class="background-gradient"></div>
    <div class="background-image" id="bg-image"></div>
  </div>
  
  <div class="overlay">
    <div class="container">
      <!-- Big Time -->
      <div class="time-section">
        <div class="big-time" id="time"></div>
      </div>
      
      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat days">
          <div class="stat-value" id="days-until">--</div>
          <div class="stat-label">Days to R3</div>
        </div>
        
        <div class="stat balance">
          <div class="stat-value" id="balance">$0</div>
          <div class="stat-label">LLM Balance</div>
        </div>
        
        <div class="stat weather">
          <div class="stat-value">
            <span class="weather-text" id="weather-icon">--</span>
            <span class="weather-temp" id="weather-temp">--</span>
          </div>
          <div class="stat-label">Weather</div>
        </div>
      </div>
      
      <!-- On My Mind -->
      <div class="on-my-mind">
        <div class="on-my-mind-label">On My Mind</div>
        <div class="on-my-mind-text" id="on-my-mind">Loading...</div>
      </div>
    </div>
    
    <div class="owl">OWL</div>
  </div>
  
  <script>
    // static.photos categories
    const dayCategoryMap = {
      0: 'nature',
      1: 'mountains',
      2: 'ocean',
      3: 'city',
      4: 'forest',
      5: 'beach',
      6: 'travel'
    };
    
    // Weather to text mapping
    const weatherMap = {
      'Sunny': { text: 'SUNNY', category: 'sunset' },
      'Partly cloudy': { text: 'PARTLY CLOUDY', category: 'clouds' },
      'Cloudy': { text: 'CLOUDY', category: 'clouds' },
      'Overcast': { text: 'OVERCAST', category: 'clouds' },
      'Mist': { text: 'MIST', category: 'clouds' },
      'Patchy rain possible': { text: 'RAIN', category: 'rain' },
      'Patchy light rain': { text: 'RAIN', category: 'rain' },
      'Light rain': { text: 'RAIN', category: 'rain' },
      'Moderate rain': { text: 'RAIN', category: 'rain' },
      'Heavy rain': { text: 'HEAVY RAIN', category: 'rain' },
      'Thunderstorm': { text: 'STORM', category: 'rain' },
      'Snow': { text: 'SNOW', category: 'snow' },
      'Blizzard': { text: 'BLIZZARD', category: 'snow' },
      'Fog': { text: 'FOG', category: 'clouds' }
    };
    
    // On my mind options (fallback)
    const onMyMindOptions = [
      "Thinking about the next R3 training run",
      "Ready to crush today's goals",
      "Considering a longer run tomorrow",
      "Grateful for this trail system",
      "Planning the week ahead",
      "Just taking it one mile at a time",
      "Visualizing crossing that finish line",
      "Staying present, staying strong",
      "Every step counts toward May 9th",
      "Today is a good day to run"
    ];
    
    // === BACKGROUND IMAGE ===
    function setBackgroundImage(category) {
      document.getElementById('bg-image').style.backgroundImage = 
        `url('https://static.photos/1920x1080/${category}')`;
    }
    
    // === TIME (NO AM/PM) ===
    function updateTime() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const timeStr = `${hours}:${minutes.toString().padStart(2, '0')}`;
      document.getElementById('time').textContent = timeStr;
    }
    
    // === DAYS UNTIL R3 ===
    function updateDaysUntil() {
      const r3Date = new Date('2026-05-09');
      const today = new Date();
      const daysUntil = Math.ceil((r3Date - today) / (1000 * 60 * 60 * 24));
      document.getElementById('days-until').textContent = daysUntil;
    }
    
    // === LLM BALANCE ===
    async function loadBalance() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/seth1993/pi-dashboard/main/balance.json', { cache: 'no-cache' });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('balance').textContent = '$' + Math.floor(data.minimax);
        }
      } catch(e) { console.log('Balance:', e.message); }
    }
    
    // === ON MY MIND ===
    async function loadOnMyMind() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/seth1993/pi-dashboard/main/tasks.json', { cache: 'no-cache' });
        if (res.ok) {
          const data = await res.json();
          if (data.onMyMind && data.onMyMind.trim() !== '') {
            document.getElementById('on-my-mind').textContent = data.onMyMind;
            return;
          }
        }
      } catch(e) { console.log('onMyMind:', e.message); }
      
      // Fallback
      const dayIndex = new Date().getDay();
      const index = (dayIndex + Math.floor(Math.random() * 3)) % onMyMindOptions.length;
      document.getElementById('on-my-mind').textContent = onMyMindOptions[index];
    }
    
    // === WEATHER (CURRENT + TEXT) ===
    function loadWeather() {
      fetch('https://wttr.in/?format=j1')
        .then(r => r.json())
        .then(d => {
          const w = d.current_condition[0];
          const tempF = Math.round(w.temp_F);
          const weatherDesc = w.weatherDesc[0].value;
          
          // Get weather mapping
          let weatherInfo = weatherMap[weatherDesc] || { text: 'CLEAR', category: 'nature' };
          
          // Update UI - text only
          document.getElementById('weather-icon').textContent = weatherInfo.text;
          document.getElementById('weather-temp').textContent = tempF + '°';
          
          // Set background to weather-relevant image
          setBackgroundImage(weatherInfo.category);
        })
        .catch(() => {
          // Fallback to day-based image on error
          const dayOfWeek = new Date().getDay();
          setBackgroundImage(dayCategoryMap[dayOfWeek] || 'nature');
          document.getElementById('weather-icon').textContent = 'CLEAR';
          document.getElementById('weather-temp').textContent = '--';
        });
    }
    
    // === INIT ===
    updateTime();
    updateDaysUntil();
    loadBalance();
    loadOnMyMind();
    loadWeather();
    
    // Auto-refresh
    setTimeout(() => location.reload(), 30000);
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
