<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root { --owl-yellow: #f0b429; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
    }
    
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    .background-gradient {
      position: absolute;
      left: 0;
      top: 0;
      width: 25%;
      height: 100%;
      background: linear-gradient(180deg, #0d1117 0%, #161b22 50%, #1a1a2e 100%);
      z-index: 1;
    }
    
    .background-image {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    
    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 40px;
      background: linear-gradient(90deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 50%, transparent 100%);
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .big-time { 
      font-size: 14rem; 
      font-weight: 100;
      line-height: 0.9;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stats-row {
      display: flex;
      gap: 80px;
      align-items: flex-start;
      margin-top: 40px;
    }
    
    .stat { text-align: left; }
    .stat-value { font-size: 4.5rem; font-weight: bold; line-height: 1; }
    .stat-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-top: 8px; }
    .stat.days .stat-value { color: #f39c12; }
    .stat.balance .stat-value { color: var(--owl-yellow); }
    .weather-text { font-size: 1.5rem; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.7); }
    .weather-temp { font-size: 4.5rem; font-weight: bold; }
    
    .qa-section { margin-top: 50px; max-width: 900px; }
    .qa-statement { font-size: 2.5rem; font-weight: 300; color: rgba(255,255,255,0.9); margin-bottom: 15px; }
    .qa-statement-highlight { color: var(--owl-yellow); font-weight: 500; }
    .qa-question { font-size: 3rem; font-weight: 300; line-height: 1.2; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
    
    .qa-buttons { display: flex; gap: 30px; }
    .qa-btn { padding: 25px 60px; font-size: 2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: all 0.2s ease; min-width: 200px; }
    .qa-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); transform: translateY(-2px); }
    .qa-btn.yes { border-color: rgba(46, 204, 113, 0.5); }
    .qa-btn.yes:hover { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; }
    .qa-btn.no { border-color: rgba(231, 76, 60, 0.5); }
    .qa-btn.no:hover { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }
    
    .owl { position: absolute; bottom: 40px; right: 40px; font-size: 2rem; color: rgba(255,255,255,0.3); letter-spacing: 5px; }
    .chess-btn { position: absolute; top: 40px; right: 40px; font-size: 3rem; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
    .chess-btn:hover { opacity: 1; }
    .chess-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; }
    .chess-modal.active { display: flex; align-items: center; justify-content: center; }
    .chess-board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 4px solid #8b4513; }
    .chess-square { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; }
    .chess-square.white { background: #f0d9b5; }
    .chess-square.black { background: #b58863; }
    .chess-close { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: white; cursor: pointer; }
    
    body.dark-mode .big-time { background: linear-gradient(135deg, #58a6ff 0%, rgba(88, 166, 255, 0.5) 100%); -webkit-background-clip: text; background-clip: text; }
    body.dark-mode .qa-statement-highlight, body.dark-mode .stat.balance .stat-value { color: #58a6ff; }
    body.dark-mode .stat.days .stat-value { color: #a371f7; }
    
    @media (max-width: 900px) {
      .background-gradient { width: 50%; }
      .background-image { width: 50%; }
      .overlay { background: rgba(10,10,15,0.9); padding: 20px; }
      .big-time { font-size: 7rem; }
      .stats-row { flex-direction: column; gap: 30px; margin-top: 30px; }
      .stat-value { font-size: 3rem; }
      .weather-temp { font-size: 3rem; }
      .qa-section { margin-top: 30px; }
      .qa-statement { font-size: 1.8rem; }
      .qa-question { font-size: 2rem; }
      .qa-buttons { flex-direction: column; gap: 15px; }
      .qa-btn { padding: 20px 40px; font-size: 1.5rem; min-width: auto; }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="background-gradient"></div>
    <div class="background-image" id="bg-image"></div>
  </div>
  
  <div class="overlay">
    <div class="container">
      <div class="big-time" id="time"></div>
      
      <div class="stats-row">
        <div class="stat days"><div class="stat-value" id="days-until">--</div><div class="stat-label">🏃 Days to R3</div></div>
        <div class="stat balance"><div class="stat-value" id="balance">$0</div><div class="stat-label">💰 LLM Balance</div></div>
        <div class="stat weather"><div class="stat-value"><span class="weather-text" id="weather-icon">--</span><span class="weather-temp" id="weather-temp">--</span></div><div class="stat-label">🌤️ Weather</div></div>
      </div>
      
      <div class="qa-section">
        <div class="qa-statement" id="qa-statement"></div>
        <div class="qa-question" id="qa-question">Loading...</div>
        <div class="qa-buttons">
          <button class="qa-btn yes" id="btn-yes">Yes</button>
          <button class="qa-btn no" id="btn-no">No</button>
        </div>
      </div>
    </div>
    
    <div class="owl">🦉</div>
    <div class="chess-btn" onclick="toggleChess()">♟️</div>
    
    <div class="chess-modal" id="chess-modal">
      <div class="chess-close" onclick="toggleChess()">✕</div>
      <div class="chess-board" id="chess-board"></div>
    </div>
  </div>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyDEJHudLpT2A",
      authDomain: "sethexample11.firebaseapp.com",
      projectId: "sethexample11",
      storageBucket: "sethexample11.appspot.com",
      messagingSenderId: "78193417902",
      appId: "1:78193417902:web:19b00ebc1915949a96573f"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.currentQA = null;
    
    window.answerQuestion = async function(answer) {
      if (!window.currentQA) return;
      const timestamp = new Date();
      try {
        await addDoc(collection(db, 'responses'), {
          statement: window.currentQA.statement,
          task: window.currentQA.task,
          question: window.currentQA.question,
          answer: answer,
          timestamp: timestamp.toISOString(),
          dayOfWeek: timestamp.getDay(),
          hour: timestamp.getHours()
        });
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = 'SAVED!';
        btn.style.background = answer === 'yes' ? 'rgba(46, 204, 113, 0.4)' : 'rgba(231, 76, 60, 0.4)';
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = '';
          loadQuestion();
        }, 800);
      } catch(e) { console.error('Error:', e); }
    };
    
    document.getElementById('btn-yes').onclick = () => window.answerQuestion('yes');
    document.getElementById('btn-no').onclick = () => window.answerQuestion('no');
  </script>
  
  <script>
    // Fun image categories - EXCITING & ADVENTUROUS!
    const funImageMap = {
      'travel': { image: 'travel', statement: '✈️ Ready for an adventure?!' },
      'mountains': { image: 'mountains', statement: '⛰️ Conquering peaks today!' },
      'ocean': { image: 'ocean', statement: '🌊 Epic ocean vibes!' },
      'beach': { image: 'beach', statement: '🏖️ Paradise mode activated!' },
      'sunset': { image: 'sunset', statement: '🌅 Chasing sunsets!' },
      'sunrise': { image: 'sunrise', statement: '🌞 New day, new possibilities!' },
      'forest': { image: 'forest', statement: '🌲 Getting lost in nature!' },
      'water': { image: 'water', statement: '💦 Making waves!' },
      'fire': { image: 'fire', statement: '🔥 On fire today!' },
      'sports': { image: 'sports', statement: '🏆 Champion mindset!' },
      'cars': { image: 'cars', statement: '🏎️ Living life in the fast lane!' },
      'bikes': { image: 'bikes', statement: '🚴 Speed and freedom!' },
      'boats': { image: 'boats', statement: '⛵ Sailing to success!' },
      'planes': { image: 'planes', statement: '🛫 Taking flight!' },
      'trains': { image: 'trains', statement: '🚂 Choo choo, all aboard!' },
      'space': { image: 'space', statement: '🚀 Reaching for the stars!' },
      'city': { image: 'city', statement: '🌃 City that never sleeps!' },
      'night': { image: 'night', statement: '🌙 Night owl, same!' },
      'sky': { image: 'sky', statement: '☁️ Endless possibilities!' },
      'architecture': { image: 'architecture', statement: '🏛️ Building dreams!' },
      'art': { image: 'art', statement: '🎨 Creating magic!' },
      'music': { image: 'music', statement: '🎵 Living my best life!' },
      'food': { image: 'food', statement: '🍔 Fuel for greatness!' },
      'drinks': { image: 'drinks', statement: '🥂 Celebrating wins!' },
      'nature': { image: 'nature', statement: '🌿 Nature is healing!' },
      'flowers': { image: 'flowers', statement: '🌸 Blooming beautifully!' },
      'animals': { image: 'animals', statement: '🦁 King of the jungle!' },
      'desert': { image: 'desert', statement: '🏜️ Adventures in the wild!' },
      'jungle': { image: 'jungle', statement: '🌴 Wild and free!' },
      'snow': { image: 'snow', statement: '❄️ Winter wonderland!' },
      'clouds': { image: 'clouds', statement: '☁️ Dreaming big dreams!' },
      'rain': { image: 'rain', statement: '🌧️ Growth through storms!' }
    };
    
    const imageKeys = Object.keys(funImageMap);
    
    const weatherMap = {
      'Sunny': { text: 'SUNNY', category: 'sunset' },
      'Partly cloudy': { text: 'PARTLY CLOUDY', category: 'nature' },
      'Cloudy': { text: 'CLOUDY', category: 'nature' },
      'Overcast': { text: 'OVERCAST', category: 'forest' },
      'Mist': { text: 'MIST', category: 'forest' },
      'Patchy rain possible': { text: 'RAIN', category: 'forest' },
      'Patchy light rain': { text: 'RAIN', category: 'forest' },
      'Light rain': { text: 'RAIN', category: 'forest' },
      'Moderate rain': { text: 'RAIN', category: 'forest' },
      'Heavy rain': { text: 'HEAVY RAIN', category: 'forest' },
      'Thunderstorm': { text: 'STORM', category: 'forest' },
      'Snow': { text: 'SNOW', category: 'mountains' },
      'Blizzard': { text: 'BLIZZARD', category: 'mountains' },
      'Fog': { text: 'FOG', category: 'forest' }
    };
    
    // QUESTIONS tied to ClawDeck tasks (with emojis!)
    const questions = [
      "🤔 Want me to start working on {task}?",
      "🎯 Should I tackle {task} now?",
      "⏰ Time to make progress on {task}?",
      "💪 Ready to dive into {task}?",
      "🧠 Want me to figure out {task}?",
      "🚀 Should I get started on {task}?",
      "⚡ Ready to knock out {task}?",
      "🔥 Want me to work on {task}?"
    ];
    
    // TASKS from ClawDeck / projects
    const tasks = [
      "BidFolder outreach",
      "ProposalPulse landing page",
      "Pi dashboard updates",
      "LinkedIn post",
      "Cold email template",
      "Demo video",
      "Analytics setup",
      "Customer interview",
      "Case study",
      "Weekly planning",
      "GitHub issues",
      "Code review"
    ];
    
    let lastCombo = null;
    let lastImage = null;
    
    function isDarkMode() {
      const hour = new Date().getHours();
      return hour >= 22 || hour < 6;
    }
    
    function setBackgroundImage(fallbackCategory) {
      // 70% fun random image, 30% weather-based
      let category, statement;
      
      if (Math.random() < 0.7) {
        // Pick fun image, avoid repeats
        let key;
        do {
          key = imageKeys[Math.floor(Math.random() * imageKeys.length)];
        } while (key === lastImage && imageKeys.length > 1);
        lastImage = key;
        category = funImageMap[key].image;
        statement = funImageMap[key].statement;
      } else {
        category = fallbackCategory || 'nature';
        statement = null;
      }
      
      document.getElementById('bg-image').style.backgroundImage = `url('https://static.photos/1920x1080/${category}')`;
      return statement;
    }
    
    function updateTime() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const hour12 = hours % 12 || 12;
      document.getElementById('time').textContent = `${hour12}:${minutes.toString().padStart(2, '0')}`;
    }
    
    function updateDaysUntil() {
      const r3Date = new Date('2026-05-09');
      const today = new Date();
      document.getElementById('days-until').textContent = Math.ceil((r3Date - today) / (1000 * 60 * 60 * 24));
    }
    
    async function loadBalance() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/seth1993/pi-dashboard/main/balance.json', { cache: 'no-cache' });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('balance').textContent = '$' + Math.floor(data.minimax);
        }
      } catch(e) {}
    }
    
    function loadWeather() {
      fetch('https://wttr.in/?format=j1')
        .then(r => r.json())
        .then(d => {
          const w = d.current_condition[0];
          const tempF = Math.round(w.temp_F);
          const weatherDesc = w.weatherDesc[0].value;
          let weatherInfo = weatherMap[weatherDesc] || { text: 'CLEAR', category: 'nature' };
          document.getElementById('weather-icon').textContent = weatherInfo.text;
          document.getElementById('weather-temp').textContent = tempF + '°';
          const statement = setBackgroundImage(weatherInfo.category);
          if (statement) {
            window.imageStatement = statement;
          }
        })
        .catch(() => {
          setBackgroundImage('nature');
          document.getElementById('weather-icon').textContent = 'CLEAR';
          document.getElementById('weather-temp').textContent = '--';
        });
    }
    
    function loadQuestion() {
      // Use image statement if available, otherwise pick random
      let statement = window.imageStatement;
      if (!statement) {
        const keys = Object.keys(funImageMap);
        const key = keys[Math.floor(Math.random() * keys.length)];
        statement = funImageMap[key].statement;
      }
      
      // Pick random task + question combo
      let task, question, combo;
      do {
        task = tasks[Math.floor(Math.random() * tasks.length)];
        const questionTemplate = questions[Math.floor(Math.random() * questions.length)];
        question = questionTemplate.replace('{task}', task);
        combo = task + '|' + question;
      } while (combo === lastCombo && tasks.length > 1);
      lastCombo = combo;
      
      window.currentQA = { statement, task, question };
      document.getElementById('qa-statement').innerHTML = `<span class="qa-statement-highlight">${statement}</span>`;
      document.getElementById('qa-question').textContent = question;
    }
    
    // Init
    updateTime();
    updateDaysUntil();
    loadBalance();
    loadWeather();
    
    if (isDarkMode()) {
      document.body.classList.add('dark-mode');
    }
    
    setTimeout(loadQuestion, 100);
    setTimeout(() => location.reload(), 5 * 60 * 1000);
    setInterval(updateTime, 1000);
    
    // Chess game
    const chessPieces = {
      'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
      'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
    };
    
    let chessBoard = [
      ['r','n','b','q','k','b','n','r'],
      ['p','p','p','p','p','p','p','p'],
      ['','','','','','','',''],
      ['','','','','','','',''],
      ['','','','','','','',''],
      ['','','','','','','',''],
      ['P','P','P','P','P','P','P','P'],
      ['R','N','B','Q','K','B','N','R']
    ];
    
    function renderChess() {
      const board = document.getElementById('chess-board');
      board.innerHTML = '';
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const square = document.createElement('div');
          square.className = 'chess-square ' + ((row + col) % 2 === 0 ? 'white' : 'black');
          const piece = chessBoard[row][col];
          square.textContent = piece ? chessPieces[piece] : '';
          square.onclick = () => movePiece(row, col);
          board.appendChild(square);
        }
      }
    }
    
    let selectedSquare = null;
    
    function movePiece(row, col) {
      if (selectedSquare) {
        chessBoard[row][col] = chessBoard[selectedSquare.row][selectedSquare.col];
        chessBoard[selectedSquare.row][selectedSquare.col] = '';
        selectedSquare = null;
        renderChess();
      } else {
        if (chessBoard[row][col]) {
          selectedSquare = { row, col };
        }
      }
    }
    
    function toggleChess() {
      document.getElementById('chess-modal').classList.toggle('active');
      if (document.getElementById('chess-modal').classList.contains('active')) {
        renderChess();
      }
    }
  </script>
</body>
</html>
