<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan's Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --owl-yellow: #f0b429;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
    }
    
    /* Background: 30% gradient, 70% image */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    .background-gradient {
      position: absolute;
      left: 0;
      top: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1a2e 100%);
      z-index: 1;
    }
    
    .background-image {
      position: absolute;
      right: 0;
      top: 0;
      width: 65%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    
    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 40px;
      background: linear-gradient(90deg, rgba(10,10,15,0.92) 0%, rgba(10,10,15,0.7) 60%, transparent 100%);
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* Big time - huge, no AM/PM */
    .big-time { 
      font-size: 12rem; 
      font-weight: 100;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .greeting {
      font-size: 2rem;
      color: rgba(255,255,255,0.5);
      margin-top: 20px;
    }
    
    /* Stats row */
    .stats-row {
      display: flex;
      gap: 60px;
      margin-top: 60px;
    }
    
    .stat {
      text-align: left;
    }
    
    .stat-value {
      font-size: 5rem;
      font-weight: bold;
      line-height: 1;
    }
    
    .stat-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-top: 10px;
    }
    
    .stat.days .stat-value {
      color: #f39c12;
    }
    
    .stat.balance .stat-value {
      color: var(--owl-yellow);
    }
    
    .emoji {
      position: absolute;
      bottom: 40px;
      left: 40px;
      font-size: 5rem;
    }
    
    /* Mobile */
    @media (max-width: 900px) {
      .background-gradient { width: 50%; }
      .background-image { width: 50%; }
      .overlay { background: rgba(10,10,15,0.85); padding: 20px; }
      .big-time { font-size: 6rem; }
      .greeting { font-size: 1.5rem; }
      .stats-row { flex-direction: column; gap: 30px; margin-top: 40px; }
      .stat-value { font-size: 3.5rem; }
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="background">
    <div class="background-gradient"></div>
    <div class="background-image" id="bg-image"></div>
  </div>
  
  <div class="overlay">
    <div class="container">
      <!-- Big Time -->
      <div class="big-time" id="time"></div>
      <div class="greeting">Seth & Kare 💕</div>
      
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat days">
          <div class="stat-value" id="days-until">--</div>
          <div class="stat-label">Days to R3</div>
        </div>
        
        <div class="stat balance">
          <div class="stat-value" id="balance">$0</div>
          <div class="stat-label">LLM Balance</div>
        </div>
      </div>
    </div>
    
    <div class="emoji">🦉</div>
  </div>
  
  <script>
    // static.photos categories
    const dayCategoryMap = {
      0: 'nature',
      1: 'mountains',
      2: 'ocean',
      3: 'city',
      4: 'forest',
      5: 'beach',
      6: 'travel'
    };
    
    // === BACKGROUND IMAGE ===
    function setBackgroundImage() {
      const dayOfWeek = new Date().getDay();
      const category = dayCategoryMap[dayOfWeek] || 'nature';
      document.getElementById('bg-image').style.backgroundImage = 
        `url('https://static.photos/1920x1080/${category}')`;
    }
    
    // === TIME (NO AM/PM) ===
    function updateTime() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const hour24 = hours; // 24-hour format
      const timeStr = `${hour24}:${minutes.toString().padStart(2, '0')}`;
      document.getElementById('time').textContent = timeStr;
    }
    
    // === DAYS UNTIL R3 ===
    function updateDaysUntil() {
      const r3Date = new Date('2026-05-09');
      const today = new Date();
      const daysUntil = Math.ceil((r3Date - today) / (1000 * 60 * 60 * 24));
      document.getElementById('days-until').textContent = daysUntil;
    }
    
    // === LLM BALANCE ===
    async function loadBalance() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/seth1993/pi-dashboard/main/balance.json', { cache: 'no-cache' });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('balance').textContent = '$' + Math.floor(data.minimax);
        }
      } catch(e) { console.log('Balance:', e.message); }
    }
    
    // === INIT ===
    setBackgroundImage();
    updateTime();
    updateDaysUntil();
    loadBalance();
    
    // Auto-refresh
    setTimeout(() => location.reload(), 30000);
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
