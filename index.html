<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan's Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --owl-yellow: #f0b429;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      color: #fff;
    }
    
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    .background-gradient {
      position: absolute;
      left: 0;
      top: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(180deg, #0d1117 0%, #161b22 50%, #1a1a2e 100%);
      z-index: 1;
    }
    
    .background-image {
      position: absolute;
      right: 0;
      top: 0;
      width: 65%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    
    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 40px;
      background: linear-gradient(90deg, rgba(10,10,15,0.92) 0%, rgba(10,10,15,0.6) 50%, transparent 100%);
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .big-time { 
      font-size: 14rem; 
      font-weight: 100;
      line-height: 0.9;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .stats-row {
      display: flex;
      gap: 80px;
      align-items: flex-start;
      margin-top: 40px;
    }
    
    .stat { text-align: left; }
    
    .stat-value {
      font-size: 4.5rem;
      font-weight: bold;
      line-height: 1;
    }
    
    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
    }
    
    .stat.days .stat-value { color: #f39c12; }
    .stat.balance .stat-value { color: var(--owl-yellow); }
    
    .weather-text {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
    }
    
    .weather-temp {
      font-size: 4.5rem;
      font-weight: bold;
    }
    
    .qa-section {
      margin-top: 50px;
      max-width: 900px;
    }
    
    .qa-statement {
      font-size: 2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }
    
    .qa-statement-highlight {
      color: var(--owl-yellow);
    }
    
    .qa-question {
      font-size: 3.5rem;
      font-weight: 300;
      line-height: 1.2;
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
    }
    
    .qa-buttons {
      display: flex;
      gap: 30px;
    }
    
    .qa-btn {
      padding: 25px 60px;
      font-size: 2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 200px;
    }
    
    .qa-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }
    
    .qa-btn.yes { border-color: rgba(46, 204, 113, 0.5); }
    .qa-btn.yes:hover { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; }
    .qa-btn.no { border-color: rgba(231, 76, 60, 0.5); }
    .qa-btn.no:hover { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }
    
    .owl {
      position: absolute;
      bottom: 40px;
      right: 40px;
      font-size: 2rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    
    @media (max-width: 900px) {
      .background-gradient { width: 50%; }
      .background-image { width: 50%; }
      .overlay { background: rgba(10,10,15,0.85); padding: 20px; }
      .big-time { font-size: 7rem; }
      .stats-row { flex-direction: column; gap: 30px; margin-top: 30px; }
      .stat-value { font-size: 3rem; }
      .weather-temp { font-size: 3rem; }
      .qa-section { margin-top: 30px; }
      .qa-statement { font-size: 1.5rem; }
      .qa-question { font-size: 2rem; }
      .qa-buttons { flex-direction: column; gap: 15px; }
      .qa-btn { padding: 20px 40px; font-size: 1.5rem; min-width: auto; }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="background-gradient"></div>
    <div class="background-image" id="bg-image"></div>
  </div>
  
  <div class="overlay">
    <div class="container">
      <div class="big-time" id="time"></div>
      
      <div class="stats-row">
        <div class="stat days">
          <div class="stat-value" id="days-until">--</div>
          <div class="stat-label">Days to R3</div>
        </div>
        
        <div class="stat balance">
          <div class="stat-value" id="balance">$0</div>
          <div class="stat-label">LLM Balance</div>
        </div>
        
        <div class="stat weather">
          <div class="stat-value">
            <span class="weather-text" id="weather-icon">--</span>
            <span class="weather-temp" id="weather-temp">--</span>
          </div>
          <div class="stat-label">Weather</div>
        </div>
      </div>
      
      <div class="qa-section">
        <div class="qa-statement" id="qa-statement"></div>
        <div class="qa-question" id="qa-question">Loading...</div>
        <div class="qa-buttons">
          <button class="qa-btn yes" id="btn-yes">Yes</button>
          <button class="qa-btn no" id="btn-no">No</button>
        </div>
      </div>
    </div>
    
    <div class="owl">OWL</div>
  </div>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    
    const firebaseConfig = {
      apiKey: "AIzaSyDEJHudLpT2A",
      authDomain: "sethexample11.firebaseapp.com",
      projectId: "sethexample11",
      storageBucket: "sethexample11.appspot.com",
      messagingSenderId: "78193417902",
      appId: "1:78193417902:web:19b00ebc1915949a96573f"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    window.currentQA = null;
    
    window.answerQuestion = async function(answer) {
      if (!window.currentQA) {
        alert('No question loaded');
        return;
      }
      
      const timestamp = new Date();
      
      try {
        await addDoc(collection(db, 'responses'), {
          statement: window.currentQA.statement,
          question: window.currentQA.question,
          type: window.currentQA.type,
          answer: answer,
          timestamp: timestamp.toISOString(),
          dayOfWeek: timestamp.getDay(),
          hour: timestamp.getHours()
        });
        
        // Visual feedback
        const btn = event.target;
        const originalText = btn.textContent;
        btn.textContent = 'SAVED!';
        btn.style.background = answer === 'yes' ? 'rgba(46, 204, 113, 0.4)' : 'rgba(231, 76, 60, 0.4)';
        
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = '';
          loadQuestion();
        }, 800);
        
      } catch(e) {
        console.error('Error saving:', e);
        alert('Error: ' + e.message);
      }
    };
    
    // Attach click handlers
    document.getElementById('btn-yes').onclick = () => window.answerQuestion('yes');
    document.getElementById('btn-no').onclick = () => window.answerQuestion('no');
  </script>
  
  <script>
    const dayCategoryMap = {
      0: 'nature', 1: 'mountains', 2: 'ocean', 3: 'city',
      4: 'forest', 5: 'beach', 6: 'travel'
    };
    
    const weatherMap = {
      'Sunny': { text: 'SUNNY', category: 'sunset' },
      'Partly cloudy': { text: 'PARTLY CLOUDY', category: 'clouds' },
      'Cloudy': { text: 'CLOUDY', category: 'clouds' },
      'Overcast': { text: 'OVERCAST', category: 'clouds' },
      'Mist': { text: 'MIST', category: 'clouds' },
      'Patchy rain possible': { text: 'RAIN', category: 'rain' },
      'Patchy light rain': { text: 'RAIN', category: 'rain' },
      'Light rain': { text: 'RAIN', category: 'rain' },
      'Moderate rain': { text: 'RAIN', category: 'rain' },
      'Heavy rain': { text: 'HEAVY RAIN', category: 'rain' },
      'Thunderstorm': { text: 'STORM', category: 'rain' },
      'Snow': { text: 'SNOW', category: 'snow' },
      'Blizzard': { text: 'BLIZZARD', category: 'snow' },
      'Fog': { text: 'FOG', category: 'clouds' }
    };
    
    // Q&A Pool from skill
    const qaPool = {
      tasks: [
        { statement: "I need help with", question: "Can you help me with BidFolder outreach?", type: "task" },
        { statement: "I need help with", question: "Can you help me finalize the ProposalPulse landing page?", type: "task" },
        { statement: "I need help with", question: "Can you help me set up analytics for the dashboard?", type: "task" },
        { statement: "I need help with", question: "Can you help me write a cold email template?", type: "task" },
        { statement: "I need help with", question: "Can you help me review this code?", type: "task" },
        { statement: "I need help with", question: "Can you help me plan next week's tasks?", type: "task" }
      ],
      ideas: [
        { statement: "I came up with this great idea for", question: "What do you think about adding dark mode to the dashboard?", type: "idea" },
        { statement: "I came up with this great idea for", question: "What do you think about automating the weekly report?", type: "idea" },
        { statement: "I came up with this great idea for", question: "What do you think about a training plan tracker?", type: "idea" },
        { statement: "I came up with this great idea for", question: "What do you think about a new feature on ProposalPulse?", type: "idea" }
      ],
      projects: [
        { statement: "We could work on", question: "Should we focus on BidFolder today?", type: "project" },
        { statement: "We could work on", question: "Should we push ProposalPulse forward?", type: "project" },
        { statement: "We could work on", question: "Should we tackle the Pi dashboard?", type: "project" }
      ],
      training: [
        { statement: "Training for R3", question: "Ready to run today?", type: "training" },
        { statement: "Time for a long run", question: "Should we log some serious miles?", type: "training" },
        { statement: "Recovery day", question: "Want an easy recovery run?", type: "training" }
      ],
      daySpecific: {
        0: [ // Sunday
          { statement: "Planning the week", question: "Ready to plan the week ahead?", type: "task" },
          { statement: "Reflecting on the week", question: "Want to review this week's goals?", type: "task" }
        ],
        1: [ // Monday
          { statement: "Fresh start Monday", question: "Ready to start the week strong?", type: "task" },
          { statement: "Monday motivation", question: "Feeling motivated for Monday?", type: "task" }
        ],
        5: [ // Saturday
          { statement: "Weekend long run", question: "Is today a long run day?", type: "training" },
          { statement: "Saturday adventure", question: "Ready for a weekend trail run?", type: "training" }
        ],
        6: [ // Sunday
          { statement: "Recovery day", question: "Ready for an easy recovery run?", type: "training" },
          { statement: "Reflection", question: "Time to reflect on the week?", type: "task" }
        ]
      }
    };
    
    let lastQA = null;
    
    function setBackgroundImage(category) {
      document.getElementById('bg-image').style.backgroundImage = 
        `url('https://static.photos/1920x1080/${category}')`;
    }
    
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = 
        `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
    }
    
    function updateDaysUntil() {
      const r3Date = new Date('2026-05-09');
      const today = new Date();
      document.getElementById('days-until').textContent = 
        Math.ceil((r3Date - today) / (1000 * 60 * 60 * 24));
    }
    
    async function loadBalance() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/seth1993/pi-dashboard/main/balance.json', { cache: 'no-cache' });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('balance').textContent = '$' + Math.floor(data.minimax);
        }
      } catch(e) { console.log('Balance:', e.message); }
    }
    
    function loadWeather() {
      fetch('https://wttr.in/?format=j1')
        .then(r => r.json())
        .then(d => {
          const w = d.current_condition[0];
          const tempF = Math.round(w.temp_F);
          const weatherDesc = w.weatherDesc[0].value;
          let weatherInfo = weatherMap[weatherDesc] || { text: 'CLEAR', category: 'nature' };
          document.getElementById('weather-icon').textContent = weatherInfo.text;
          document.getElementById('weather-temp').textContent = tempF + '°';
          setBackgroundImage(weatherInfo.category);
        })
        .catch(() => {
          const dayOfWeek = new Date().getDay();
          setBackgroundImage(dayCategoryMap[dayOfWeek] || 'nature');
          document.getElementById('weather-icon').textContent = 'CLEAR';
          document.getElementById('weather-temp').textContent = '--';
        });
    }
    
    function loadQuestion() {
      const dayOfWeek = new Date().getDay();
      const rand = Math.random();
      
      let pool;
      
      // 30% day-specific, 30% tasks, 20% ideas, 10% projects, 10% training
      if (rand < 0.3 && qaPool.daySpecific[dayOfWeek]) {
        pool = qaPool.daySpecific[dayOfWeek];
      } else if (rand < 0.6) {
        pool = qaPool.tasks;
      } else if (rand < 0.8) {
        pool = qaPool.ideas;
      } else if (rand < 0.9) {
        pool = qaPool.projects;
      } else {
        pool = qaPool.training;
      }
      
      // Pick random, avoid repeats
      let qa;
      do {
        qa = pool[Math.floor(Math.random() * pool.length)];
      } while (qa === lastQA && pool.length > 1);
      
      lastQA = qa;
      window.currentQA = qa;
      
      document.getElementById('qa-statement').innerHTML = 
        `${qa.statement} <span class="qa-statement-highlight">${qa.question.split('?')[0]}?</span>`;
      document.getElementById('qa-question').textContent = qa.question;
    }
    
    updateTime();
    updateDaysUntil();
    loadBalance();
    loadWeather();
    setTimeout(loadQuestion, 100);
    
    setTimeout(() => location.reload(), 30000);
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
